<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
padding:30px;
}

h1{
font-size:35px;
margin-bottom:20px;
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

button{
padding:8px 15px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.logout{
background:#ff4d4d;
color:white;
}

.download{
background:#19d3c5;
}

table{
width:100%;
margin:auto;
border-collapse:collapse;
border-radius:10px;
overflow:hidden;
font-size:14px;
}

thead{
background:#19d3c5;
color:black;
}

th,td{
padding:10px;
border:1px solid rgba(255,255,255,0.1);
}

tbody tr:nth-child(even){
background:#2c3e50;
}

tbody tr:nth-child(odd){
background:#34495e;
}

.approve{
background:#2ecc71;
color:white;
}

.reject{
background:#e74c3c;
color:white;
}

.cancel{
background:#f39c12;
color:white;
}

select{
padding:8px;
border-radius:8px;
border:none;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:flex;
justify-content:center;
align-items:center;
}

.hidden{
display:none;
}

.modal-content{
background:#1e2c3b;
padding:20px;
border-radius:15px;
width:300px;
}

.modal-content textarea{
width:100%;
height:100px;
border-radius:8px;
border:none;
padding:8px;
}

.modal-content button{
margin-top:10px;
width:100%;
}
</style>
</head>

<body>

<div class="top-bar">
<h1>📋 Admin Panel</h1>
<div>
<select id="statusFilter" onchange="loadBookings()">
<option value="">All</option>
<option value="approved">Approved</option>
<option value="waiting">Waiting</option>
<option value="rejected">Rejected</option>
<option value="cancelled">Cancelled</option>
</select>

<button class="download" onclick="window.location.href='/download-report'">
Download Report
</button>

<button class="logout" onclick="window.location.href='/logout'">
Logout
</button>
</div>
</div>

<table>
<thead>
<tr>
<th>ID</th>
<th>Hall</th>
<th>Date</th>
<th>Slot</th>
<th>Name</th>
<th>Dept</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="bookingList">
</tbody>
</table>

<!-- Rejection Modal -->
<div id="rejectModal" class="modal hidden">
<div class="modal-content">
<h3>Enter Rejection Reason</h3>
<textarea id="rejectReason"></textarea>
<button onclick="submitReject()">Submit</button>
<button onclick="closeReject()">Cancel</button>
</div>
</div>

<script>

let rejectId = null;

async function loadBookings(){

const res = await fetch("/api/bookings");
const data = await res.json();

const statusFilter = document.getElementById("statusFilter").value;

const tbody = document.getElementById("bookingList");
tbody.innerHTML = "";

let filtered = data;

if(statusFilter){
filtered = data.filter(b => b[10] === statusFilter);
}

filtered.forEach(b => {

tbody.innerHTML += `
<tr>
<td>${b[0]}</td>
<td>${b[1]}</td>
<td>${b[2]}</td>
<td>${b[3]}</td>
<td>${b[6]}</td>
<td>${b[7]}</td>
<td>${b[10]}</td>
<td>
${actionButtons(b)}
</td>
</tr>
`;

});
}

function actionButtons(b){

if(b[10] !== "waiting"){
return "-";
}

return `
<button class="approve" onclick="approve(${b[0]})">Approve</button>
<button class="reject" onclick="openReject(${b[0]})">Reject</button>
<button class="cancel" onclick="cancelBooking(${b[0]})">Cancel</button>
`;
}

async function approve(id){
await fetch(`/approve/${id}`);
loadBookings();
}

function openReject(id){
rejectId = id;
document.getElementById("rejectModal").classList.remove("hidden");
}

function closeReject(){
document.getElementById("rejectModal").classList.add("hidden");
}

async function submitReject(){

const reason = document.getElementById("rejectReason").value.trim();

if(!reason){
alert("Enter reason");
return;
}

await fetch(`/reject/${rejectId}`,{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:`reason=${encodeURIComponent(reason)}`
});

closeReject();
loadBookings();
}

async function cancelBooking(id){
await fetch(`/cancel/${id}`, {method:"POST"});
loadBookings();
}

setInterval(loadBookings, 5000);
loadBookings();

</script>

</body>
</html>
